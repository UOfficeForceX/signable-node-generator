<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>外部簽核站點 JSON 產生器</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3 mb-0">
  <span class="navbar-brand mb-0 h1">外部簽核站點 JSON 產生器</span>
  <div class="d-flex gap-2">
    <button id="btnImport" type="button" class="btn btn-outline-light btn-sm">匯入 JSON</button>
    <button id="btnOpenPreview" type="button" class="btn btn-outline-light btn-sm d-none">開啟 JSON 預覽</button>
  </div>
</nav>

<div class="app-layout" id="appLayout">
  <section class="app-col col-left" id="colLeft">
    <div class="col-header">
      <h6 class="mb-0">站點預覽</h6>
      <button id="btnAddNode" type="button" class="btn btn-primary btn-sm">+ 新增站點</button>
    </div>
    <div class="site-list" id="siteList"></div>
  </section>

  <div class="resizer" id="resizerLeft"></div>

  <section class="app-col col-middle" id="colMiddle">
    <div class="col-header">
      <h6 class="mb-0">站點屬性檢視及編輯</h6>
    </div>
    <div class="editor-body" id="editorContainer"></div>
  </section>

  <div class="resizer" id="resizerRight"></div>

  <section class="app-col col-right" id="colRight">
    <div class="col-header">
      <h6 class="mb-0">JSON 預覽</h6>
      <div class="d-flex gap-2">
        <button id="btnCopyJson" type="button" class="btn btn-outline-secondary btn-sm">複製 JSON</button>
        <button id="btnExportJson" type="button" class="btn btn-outline-secondary btn-sm">下載 JSON</button>
        <button id="btnClosePreview" type="button" class="btn btn-outline-secondary btn-sm">關閉預覽</button>
      </div>
    </div>
    <div id="validationErrors" class="validation-errors"></div>
    <pre id="jsonPreview" class="json-preview"></pre>
  </section>
</div>

<!-- 匯入 Modal -->
<div class="modal fade" id="importModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">匯入 JSON</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label" for="importFileInput">選擇 .json 檔案</label>
          <input type="file" id="importFileInput" class="form-control" accept=".json,application/json">
        </div>
        <div class="mb-3">
          <label class="form-label" for="importTextInput">或貼上 JSON 文字</label>
          <textarea id="importTextInput" class="form-control" rows="12" placeholder='{"signableNodes": []}'></textarea>
        </div>
        <div id="importErrors" class="text-danger small"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" id="btnConfirmImport" class="btn btn-primary">匯入</button>
      </div>
    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="js/constants.js"></script>
<script src="js/state.js"></script>
<script src="js/generator.js"></script>
<script src="js/validator.js"></script>
<script src="js/renderer.js"></script>
<script src="js/form-binder.js"></script>
<script src="js/drag-drop.js"></script>
<script src="js/layout-resizer.js"></script>
<script src="js/importer.js"></script>
<script src="js/exporter.js"></script>
<script src="js/app.js"></script>
</body>
</html>
