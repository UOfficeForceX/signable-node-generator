<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自動化測試 - 外部簽核站點 JSON 產生器</title>
  <style>
    body {
      font-family: "Segoe UI", "Microsoft JhengHei", monospace;
      padding: 24px;
      max-width: 960px;
      margin: 0 auto;
      background: #f6f8fa;
      color: #1f2328;
    }
    h1 { font-size: 20px; margin-bottom: 4px; }
    p.desc { color: #57606a; margin-top: 0; }
    .summary {
      font-weight: bold;
      font-size: 16px;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      display: inline-block;
    }
    .summary.ok { color: #1a7f37; background: #dafbe1; }
    .summary.fail { color: #cf222e; background: #ffebe9; }
    .suite {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 12px;
    }
    .suite h2 { margin: 0 0 8px; font-size: 14px; color: #24292f; }
    ul { list-style: none; padding-left: 0; margin: 0; }
    li { padding: 2px 0; font-size: 13px; }
    .test-pass { color: #1a7f37; }
    .test-fail { color: #cf222e; }
    .error-detail { margin: 2px 0 4px 20px; color: #cf222e; font-size: 12px; }
  </style>
</head>
<body>
  <h1>自動化測試</h1>
  <p class="desc">純 Vanilla JS 測試（無需 npm / build），可直接以瀏覽器開啟本頁執行。對應測試案例詳見 <code>docs/TEST_CASES.md</code>。</p>
  <div id="summary" class="summary">執行中...</div>
  <div id="results"></div>

  <!-- 應用程式邏輯（僅載入測試需要用到、與 DOM 無關的純邏輯模組） -->
  <script src="js/constants.js"></script>
  <script src="js/state.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/validator.js"></script>
  <script src="js/importer.js"></script>

  <!-- 測試框架 -->
  <script src="js/tests/test-framework.js"></script>

  <!-- 測試規格 -->
  <script src="js/tests/state.test.js"></script>
  <script src="js/tests/generator.test.js"></script>
  <script src="js/tests/validator.test.js"></script>
  <script src="js/tests/importer.test.js"></script>

  <!-- 執行並渲染結果 -->
  <script src="js/tests/run-tests.js"></script>
</body>
</html>
